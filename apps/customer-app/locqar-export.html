  <style>
    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f4f4f5;
      display: flex;
      justify-content: center;
    }

    #root {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #fff;
      position: relative;
      overflow-x: hidden;
    }

    /* Responsive: on wider screens, show as centered phone mockup */
    @media (min-width: 480px) {
      body {
        background: #e4e4e7;
        padding: 20px 0;
        align-items: flex-start;
      }

      #root {
        border-radius: 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
        min-height: calc(100vh - 40px);
        margin: 0 auto;
        overflow: hidden;
      }

      /* Constrain all fixed elements to the phone frame */
      .fixed {
        position: absolute !important;
      }
    }

    /* Tablet+ : larger centered frame */
    @media (min-width: 768px) {
      body {
        background: linear-gradient(135deg, #f0f0f5 0%, #e8e8f0 50%, #dde0ea 100%);
        padding: 40px 0;
      }

      #root {
        min-height: calc(100vh - 80px);
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(0, 0, 0, 0.06);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%)
      }

      to {
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      75%,
      100% {
        transform: scale(2.5);
        opacity: 0
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    @keyframes pop {
      0% {
        transform: scale(0.92)
      }

      60% {
        transform: scale(1.02)
      }

      100% {
        transform: scale(1)
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    @keyframes toast {
      0% {
        opacity: 0;
        transform: translateY(-12px) scale(0.96)
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: .6
      }

      50% {
        opacity: 1
      }
    }

    @keyframes progressBar {
      from {
        width: 0%
      }

      to {
        width: var(--pw)
      }
    }

    @keyframes dotPulse {

      0%,
      80%,
      100% {
        transform: scale(0)
      }

      40% {
        transform: scale(1)
      }
    }

    .fu {
      animation: fadeUp .4s cubic-bezier(.2, .9, .3, 1) both
    }

    .fi {
      animation: fadeIn .3s ease both
    }

    .pop {
      animation: pop .3s cubic-bezier(.2, .9, .3, 1)
    }

    .float {
      animation: float 3s ease-in-out infinite
    }

    .breathe {
      animation: breathe 2s ease-in-out infinite
    }

    .d1 {
      animation-delay: .06s
    }

    .d2 {
      animation-delay: .12s
    }

    .d3 {
      animation-delay: .18s
    }

    .d4 {
      animation-delay: .24s
    }

    .d5 {
      animation-delay: .3s
    }

    .tap {
      transition: transform .18s cubic-bezier(.2, .9, .3, 1), opacity .18s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none
    }

    .tap:active {
      transform: scale(0.98);
      opacity: 0.85
    }

    input:focus,
    textarea:focus {
      outline: none
    }

    .noscroll::-webkit-scrollbar {
      display: none
    }

    .noscroll {
      scrollbar-width: none
    }

    .glass {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px)
    }
  </style>
</head>

    /* ══ OTP ══ */
    function OTP(props) {
      var [o, sO] = useState(['', '', '', '', '', '']);
      var [t, sT] = useState(30);
      var [success, setSuccess] = useState(false);
      useEffect(function () { if (t > 0) { var i = setInterval(function () { sT(function (v) { return v - 1; }); }, 1000); return function () { clearInterval(i); }; } }, [t]);
      useEffect(function () { var el = document.getElementById('o-0'); if (el) el.focus(); }, []);
      var hC = function (i, v) {
        if (v.length <= 1 && /^\d*$/.test(v)) { var n = o.slice(); n[i] = v; sO(n); if (v && i < 5) { var el = document.getElementById('o-' + (i + 1)); if (el) el.focus(); } if (n.every(function (d) { return d; })) { setSuccess(true); setTimeout(props.onOk, 500); } }
      };
      var hKey = function (i, e) { if (e.key === 'Backspace' && !o[i] && i > 0) { var el = document.getElementById('o-' + (i - 1)); if (el) el.focus(); } };
      return (
        <div className="min-h-screen flex flex-col" style={{ background: T.bg }}><StatusBar />
          <Toast show={success} emoji="🎉" text="Verified!" />
          <div style={{ padding: '8px 24px' }}><button onClick={props.onBack} className="tap" style={{ width: 40, height: 40, borderRadius: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.fill, border: '1px solid ' + T.border }}><ArrowLeft style={{ width: 18, height: 18 }} /></button></div>
          <div className="flex-1" style={{ padding: '24px 24px 0' }}>
            <div className="fu">
              <div style={{ width: 52, height: 52, borderRadius: 16, background: T.fill, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26, marginBottom: 20 }}>🔐</div>
              <h1 style={{ fontSize: 26, fontWeight: 800, marginBottom: 8, letterSpacing: '-0.03em', fontFamily: hf }}>Verification code</h1>
              <p style={{ fontSize: 14, color: T.sec, marginBottom: 28, fontFamily: ff }}>Sent to <span style={{ fontWeight: 700, color: T.text, fontFamily: mf }}>+233 {props.phone}</span></p>
            </div>
            <div className="flex gap-2 justify-center mb-8 fu d1">
              {o.map(function (d, i) {
                return <input key={i} id={'o-' + i} type="text" inputMode="numeric" maxLength={1} value={d} onChange={function (e) { hC(i, e.target.value); }} onKeyDown={function (e) { hKey(i, e); }} style={{ width: 48, height: 56, borderRadius: 14, textAlign: 'center', fontSize: 24, fontWeight: 700, background: T.fill, border: '2px solid ' + (d ? T.text : 'transparent'), transition: 'all .2s', fontFamily: mf }} />;
              })}
            </div>
            <div className="text-center fu d2">{t > 0 ? <p style={{ fontSize: 13, color: T.sec, fontFamily: ff }}>Resend in <span style={{ fontWeight: 700, color: T.text, fontFamily: mf }}>{t}s</span></p> : <button onClick={function () { sT(30); }} className="tap" style={{ fontSize: 13, fontWeight: 700, color: T.accent, fontFamily: ff }}>Resend code</button>}</div>
          </div>
        </div>
      );
    }

      ];

      var handleSend = function (text) {
        var val = text || input;

        var newMsg = { id: Date.now(), text: val, sender: 'user', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
        setMsgs(function (prev) { return prev.concat([newMsg]); });
        setInput('');
        setTyping(true);
        setTimeout(function () {
          setTyping(false);
          var reply = { id: Date.now() + 1, text: "I've received your message. A human agent will be with you shortly if I can't resolve this!", sender: 'bot', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
          setMsgs(function (prev) { return prev.concat([reply]); });
        }, 1500);
      };

      React.useEffect(function () {
        if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [msgs, typing]);

      return (
        <div className="min-h-screen flex flex-col items-stretch" style={{ background: T.bg }}><StatusBar />

                      padding: '12px 16px', borderRadius: 22,
                      borderBottomLeftRadius: isBot ? 4 : 22, borderBottomRightRadius: isBot ? 22 : 4,
                      background: isBot ? '#fff' : T.text,
                      color: isBot ? T.text : '#fff',
                      border: '1.5px solid ' + (isBot ? T.border : 'transparent'),
                      boxShadow: isBot ? T.shadow : '0 8px 16px rgba(0,0,0,0.1)'

                      <p style={{ fontSize: 14, fontWeight: 500, fontFamily: ff, lineHeight: 1.5, whiteSpace: 'pre-wrap' }}>{m.text}</p>

                    })}
                  </div>
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

      var minLat = 5.54, maxLat = 5.65, minLng = -0.32, maxLng = -0.12;
      var mapW = 100, mapH = 100; // percent
      var toX = function (lng) { return ((lng - minLng) / (maxLng - minLng)) * 80 + 10; };
      var toY = function (lat) { return (1 - (lat - minLat) / (maxLat - minLat)) * 75 + 12; };

      // User location (Osu area)
      var userX = toX(-0.185);
      var userY = toY(5.558);

      var handlePinClick = function (l) { setSelPin(selPin && selPin.id === l.id ? null : l); };

      return (
        <div className="pb-24 min-h-screen" style={{ background: T.bg }}><StatusBar />

        { id: 'mtn', e: '🟡', n: 'MTN MoMo', d: 'Instant', bg: '#FEF3C7', c: '#D97706' },

      ];

      var canPay = (method === 'momo' && momoProvider && momoNum.replace(/\s/g, '').length >= 9) ||
        (method === 'card' && cardNum.replace(/\s/g, '').length >= 12 && cardExp.length >= 4 && cardCvv.length >= 3) ||
        (method === 'wallet');

      var handleApplyPromo = function () {
        if (promo.toUpperCase() === 'LOCQAR10') { setPromoApplied(true); setPromoDiscount(amt * 0.1); }
        else if (promo.toUpperCase() === 'FREE') { setPromoApplied(true); setPromoDiscount(amt); }

    /* ══ ANIMATED COUNTER ══ */
    function useCountUp(target, duration) {
      var [val, setVal] = useState(0);
      var dur = duration || 800;
      useEffect(function () {
        var start = Date.now();
        var num = typeof target === 'string' ? parseInt(target) || 0 : target;
        var frame = function () {
          var elapsed = Date.now() - start;
          var progress = Math.min(elapsed / dur, 1);
          var eased = 1 - Math.pow(1 - progress, 3);
          setVal(Math.round(eased * num));
          if (progress < 1) requestAnimationFrame(frame);
        };
        requestAnimationFrame(frame);
      }, [target]);
      return val;
    }

    function AnimatedNum(props) {
      var val = useCountUp(props.value, props.duration);
      return <span>{val}</span>;
    }

      var handleDot = function (num) {
        if (step === 1) {
          var newPin = pin + num;

          setPin(newPin);

          if (mode === 'verify' && newPin.length === 4) {
            if (newPin === existingPin) {
              setShowSuccess(true);
              setTimeout(function () { props.onBack(); }, 1200);
            } else {
              setError('Incorrect security code');
              setTimeout(function () { setPin(''); setError(''); }, 800);
            }
          } else if (mode === 'set' && newPin.length === 4) {
            setTimeout(function () { setStep(2); }, 300);
          }
        } else {
          var newConfirm = confirmPin + num;
          if (newConfirm.length > 4) return;
          setConfirmPin(newConfirm);
          setError('');
          if (newConfirm.length === 4) {
            if (newConfirm === pin) {
              setPinEnabled(true);
              setShowSuccess(true);
              setTimeout(function () { setMode('menu'); setShowSuccess(false); setPin(''); setConfirmPin(''); setStep(1); }, 1500);
            } else {
              setError('PIN codes do not match');
              setTimeout(function () { setConfirmPin(''); setError(''); }, 800);
            }

              {invoices.map(function (inv, i) {
                var isPaid = inv.status === 'Paid';
                return (
                  <div key={i} className={'fu d' + Math.min(i + 1, 5)} style={{ padding: '16px 18px', background: T.card, borderBottom: i < invoices.length - 1 ? '1px solid ' + T.fill : 'none' }}>
                    <div className="flex items-start gap-4">
                      <div style={{ width: 42, height: 42, borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, background: isPaid ? T.okBg : T.fill, border: '1px solid ' + (isPaid ? T.ok + '22' : T.border), flexShrink: 0 }}>
                        {isPaid ? '✅' : '📦'}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between">
                          <p style={{ fontSize: 14, fontWeight: 800, fontFamily: ff, color: T.text }}>{inv.plan} Plan</p>
                          <p style={{ fontSize: 15, fontWeight: 900, fontFamily: mf, color: isPaid ? T.text : T.muted }}>{inv.amount > 0 ? 'GH₵' + inv.amount : 'Free'}</p>
                        </div>
                        <p style={{ fontSize: 12, color: T.sec, fontFamily: ff, marginTop: 2 }}>{inv.date}</p>
                        <div className="flex items-center gap-3" style={{ marginTop: 8 }}>
                          <button onClick={function () { handleCopyId(inv.id); }} className="tap flex items-center gap-1.5" style={{ fontSize: 10, fontWeight: 700, color: copiedId === inv.id ? T.ok : T.sec, fontFamily: mf, padding: '4px 8px', borderRadius: 8, background: T.fill, border: '1px solid ' + T.border, transition: 'all .2s' }}>
                            {copiedId === inv.id ? <Check style={{ width: 10, height: 10 }} /> : <Copy style={{ width: 10, height: 10 }} />} {inv.id}
                          </button>
                          {isPaid && (
                            <button onClick={function () { setDownloadToast(true); setTimeout(function () { setDownloadToast(false); }, 2000); }} className="tap flex items-center gap-1" style={{ fontSize: 10, fontWeight: 700, color: T.blue, fontFamily: ff, padding: '4px 8px', borderRadius: 8, background: T.blueBg, border: '1px solid ' + T.blue + '22' }}>
                              <ExternalLink style={{ width: 10, height: 10 }} /> Receipt
                            </button>
                          )}
                        </div>
                        {isPaid && <p style={{ fontSize: 10, color: T.muted, fontFamily: ff, marginTop: 6 }}>via {inv.method}</p>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Help text */}
            <div className="fu d5 flex items-center gap-3" style={{ marginTop: 16, padding: '14px 16px', borderRadius: 16, background: T.fill, border: '1px solid ' + T.border }}>
              <Info style={{ width: 16, height: 16, color: T.sec, flexShrink: 0 }} />
              <p style={{ fontSize: 11, color: T.sec, fontFamily: ff, lineHeight: '1.5' }}>Need help with a charge? Contact support from your Account page.</p>
            </div>
          </div>
        </div>
      );
    }

    /* ══ APP ══ */
    function LocQarApp() {
      var [scr, sScr] = useState('splash');
      var [selPkg, sSelPkg] = useState(null);
      var [sendPrefill, setSendPrefill] = useState(null);
      var [payCtx, setPayCtx] = useState(null);
      var [sendConfirmed, setSendConfirmed] = useState(false);
      var [sendData, setSendData] = useState({});
      var [storageConfirmed, setStorageConfirmed] = useState(false);
      var [storageData, setStorageData] = useState({});
      var [receiveConfirmed, setReceiveConfirmed] = useState(false);
      var [receiveData, setReceiveData] = useState({});
      var [prevScr, sPrevScr] = useState('home');
      var [phone, sPhone] = useState('');
      var [navDir, setNavDir] = useState('fade');
      var [prefLocker, setPrefLocker] = useState(0);
      var [currentPlan, setCurrentPlan] = useState(null);
      var [isStudent, setIsStudent] = useState(false);
      var [studentId, setStudentId] = useState('');
      var user = { name: 'Kwame Asante', phone: '24 XXX XXXX' };
      var pkgs = [
        { id: 1, name: 'iPhone 15 Case', status: 'Ready', location: 'Osu Mall, Locker #12', fromPhone: '+233 24 XXX XXXX', toPhone: '+233 24 555 1234', time: '2h ago' },
        { id: 2, name: 'Book Bundle', status: 'In transit', location: 'En route to Accra Mall', fromPhone: '+233 20 888 5678', toPhone: '+233 24 XXX XXXX', time: '1d ago' },
        { id: 3, name: 'Nike Sneakers', status: 'Delivered', location: 'Junction Mall', fromPhone: '+233 24 XXX XXXX', toPhone: '+233 55 222 9012', time: '3d ago' }
      ];
      var mainTabs = ['home', 'activity', 'account'];

      // Determine transition direction based on navigation pattern
      var getTransition = function (from, to) {
        var tabs = mainTabs;
        var isFromTab = tabs.indexOf(from) >= 0;
        var isToTab = tabs.indexOf(to) >= 0;
        // Tab-to-tab: crossfade
        if (isFromTab && isToTab) return 'scr-fade';
        // Going deeper into a sub-screen: slide in from right
        if (isFromTab && !isToTab) return 'scr-forward';
        // Going back to a tab: slide in from left
        if (!isFromTab && isToTab) return 'scr-back';
        // Sub-screen to sub-screen (e.g. send -> payment): slide forward
        return 'scr-forward';
      };

      var nav = function (s, d) {
        if (s === 'pkg-detail' && d) sSelPkg(d);
        if (s === 'send' && d && d.contact) setSendPrefill(d);
        else if (s === 'send' && d && d.confirmed) { setSendConfirmed(true); }
        else if (s === 'send') { setSendPrefill(null); setSendConfirmed(false); setSendData({}); }
        if (s === 'storage' && d && d.confirmed) setStorageConfirmed(true);
        else if (s === 'storage') { setStorageConfirmed(false); setStorageData({}); }
        if (s === 'receive' && d && d.confirmed) setReceiveConfirmed(true);
        else if (s === 'receive') { setReceiveConfirmed(false); setReceiveData({}); }
        if (s === 'payment' && d) { setPayCtx(d); if (d.sendData) setSendData(d.sendData); if (d.storageData) setStorageData(d.storageData); if (d.receiveData) setReceiveData(d.receiveData); }
        if (s === 'support' || s === 'referral' || s === 'terms' || s === 'privacy') sPrevScr(scr);
        setNavDir(getTransition(scr, s));
        sScr(s);
      };

      // Back navigation helper - always slides back
      var goBack = function (to, d) {
        setNavDir('scr-back');
        // Directly set screen to avoid nav overriding the direction
        if (to === 'pkg-detail' && d) sSelPkg(d);
        if (to === 'support' || to === 'referral' || to === 'terms' || to === 'privacy') sPrevScr(scr);
        sScr(to);
      };

      var showNav = mainTabs.indexOf(scr) >= 0;
      var tr = navDir;

      return (
        <div className="max-w-md mx-auto min-h-screen relative" style={{ fontFamily: ff, overflow: 'hidden', background: T.bg }}>
          <div className="mesh-bg"></div>
          <GS />
          {scr === 'splash' && <Splash onDone={function () { setNavDir('scr-fade'); sScr('onboard'); }} />}
          {scr === 'onboard' && <ScreenWrap screenKey="onboard" transition="scr-fade"><Onboard onDone={function () { setNavDir('scr-up'); sScr('signup'); }} /></ScreenWrap>}
          {scr === 'signup' && <ScreenWrap screenKey="signup" transition="scr-up"><Signup onSignup={function (p) { sPhone(p); setNavDir('scr-forward'); sScr('otp'); }} onLogin={function () { setNavDir('scr-fade'); sScr('auth'); }} onBack={function () { setNavDir('scr-back'); sScr('onboard'); }} onNav={nav} /></ScreenWrap>}
          {scr === 'auth' && <ScreenWrap screenKey="auth" transition={tr}><Auth onLogin={function (p) { sPhone(p); setNavDir('scr-forward'); sScr('otp'); }} onSignup={function () { setNavDir('scr-fade'); sScr('signup'); }} onStudentLogin={function () { setNavDir('scr-fade'); sScr('student-auth'); }} /></ScreenWrap>}
          {scr === 'otp' && <ScreenWrap screenKey="otp" transition={tr}><OTP onOk={function () { setNavDir('scr-fade'); sScr('home'); }} onBack={function () { setNavDir('scr-back'); sScr('signup'); }} phone={phone} /></ScreenWrap>}
          {scr === 'subscribe' && <ScreenWrap screenKey="subscribe" transition={tr}><SubscribePage current={currentPlan} onSelect={function (p) { setCurrentPlan(p || 'student'); setNavDir('scr-fade'); sScr('sub-success'); }} onNav={nav} onBack={function () { goBack(prevScr || 'account'); }} /></ScreenWrap>}
          {scr === 'sub-success' && <ScreenWrap screenKey="sub-success" transition="scr-fade"><SubSuccessPage plan={payCtx && payCtx.onSuccessData && payCtx.onSuccessData.plan ? payCtx.onSuccessData.plan : currentPlan} onDone={function () { setNavDir('scr-fade'); sScr('home'); }} /></ScreenWrap>}
          {scr === 'home' && <ScreenWrap screenKey="home" transition={tr}><Home user={user} pkgs={pkgs} onNav={nav} prefLocker={prefLocker} onPrefLockerChange={setPrefLocker} currentPlan={currentPlan} isStudent={isStudent} studentId={studentId} /></ScreenWrap>}
          {scr === 'activity' && <ScreenWrap screenKey="activity" transition={tr}><Activities pkgs={pkgs} onNav={nav} /></ScreenWrap>}
          {scr === 'account' && <ScreenWrap screenKey="account" transition={tr}><Account user={user} currentPlan={currentPlan} onNav={nav} onLogout={function () { setNavDir('scr-fade'); sScr('auth'); }} /></ScreenWrap>}
          {scr === 'pkg-detail' && selPkg && <ScreenWrap screenKey={'pkg-' + selPkg.id} transition={tr}><PkgDetail pkg={selPkg} onBack={function () { goBack('activity'); }} onRate={function (p) { sSelPkg(p); setNavDir('scr-up'); sScr('rating'); }} /></ScreenWrap>}
          {scr === 'notifs' && <ScreenWrap screenKey="notifs" transition={tr}><Notifs onBack={function () { goBack('home'); }} /></ScreenWrap>}
          {scr === 'send' && <ScreenWrap screenKey="send" transition={tr}><Send onBack={function () { goBack('home'); }} prefill={sendPrefill} onNav={nav} confirmed={sendConfirmed} savedData={sendData} /></ScreenWrap>}
          {scr === 'edit-profile' && <ScreenWrap screenKey="edit-profile" transition={tr}><EditProfilePage user={user} onBack={function () { goBack('account'); }} /></ScreenWrap>}
          {scr === 'contacts' && <ScreenWrap screenKey="contacts" transition={tr}><ContactsPage onBack={function () { goBack('account'); }} onNav={nav} /></ScreenWrap>}
          {scr === 'pay-methods' && <ScreenWrap screenKey="pay-methods" transition={tr}><PayMethodsPage onBack={function () { goBack('account'); }} /></ScreenWrap>}
          {scr === 'notif-prefs' && <ScreenWrap screenKey="notif-prefs" transition={tr}><NotifPrefsPage onBack={function () { goBack('account'); }} /></ScreenWrap>}
          {scr === 'rewards' && <ScreenWrap screenKey="rewards" transition={tr}><RewardsPage onBack={function () { goBack('account'); }} /></ScreenWrap>}
          {scr === 'settings' && <ScreenWrap screenKey="settings" transition={tr}><SettingsPage onBack={function () { goBack('account'); }} onNav={nav} /></ScreenWrap>}
          {scr === 'storage' && <ScreenWrap screenKey="storage" transition={tr}><StoragePage onBack={function () { goBack('home'); }} onNav={nav} confirmed={storageConfirmed} savedData={storageData} /></ScreenWrap>}
          {scr === 'payment' && payCtx && <ScreenWrap screenKey="payment" transition={tr}><PaymentPage amount={payCtx.amount} label={payCtx.label} icon={payCtx.icon} items={payCtx.items} onBack={function () { setNavDir('scr-back'); sScr(payCtx.backTo || 'home'); }} onSuccess={function () { if (payCtx.onSuccessData && payCtx.onSuccessData.plan) { setCurrentPlan(payCtx.onSuccessData.plan); if (payCtx.onSuccessData.studentId) { setIsStudent(true); setStudentId(payCtx.onSuccessData.studentId); } } if (payCtx.onSuccessNav) nav(payCtx.onSuccessNav, payCtx.onSuccessData); else nav('home'); }} /></ScreenWrap>}
          {scr === 'lockers' && <ScreenWrap screenKey="lockers" transition={tr}><LockersPage onBack={function () { goBack('home'); }} /></ScreenWrap>}
          {scr === 'manage-sub' && currentPlan && <ScreenWrap screenKey="manage-sub" transition={tr}><ManageSubPage currentPlan={currentPlan} onBack={function () { goBack('account'); }} onCancelled={function () { setCurrentPlan(null); goBack('account'); }} onNav={nav} /></ScreenWrap>}
          {scr === 'receive' && <ScreenWrap screenKey="receive" transition={tr}><ReceivePage onBack={function () { goBack('home'); }} onNav={nav} prefLocker={initLockers[prefLocker]} confirmed={receiveConfirmed} savedData={receiveData} /></ScreenWrap>}
          {scr === 'call-pkg' && <ScreenWrap screenKey="call-pkg" transition={tr}><CallPackagePage onBack={function () { goBack('home'); }} onNav={nav} confirmed={false} /></ScreenWrap>}
          {scr === 'call-pkg-done' && <ScreenWrap screenKey="call-pkg-done" transition={tr}><CallPackagePage onBack={function () { goBack('home'); }} onNav={nav} confirmed={true} /></ScreenWrap>}
          {scr === 'support' && <ScreenWrap screenKey="support" transition="scr-up"><SupportChat onBack={function () { goBack(prevScr || 'home'); }} /></ScreenWrap>}
          {scr === 'referral' && <ScreenWrap screenKey="referral" transition={tr}><ReferralPage onBack={function () { goBack(prevScr || 'home'); }} /></ScreenWrap>}
          {scr === 'rating' && selPkg && <ScreenWrap screenKey="rating" transition={tr}><RatingPage pkg={selPkg} onBack={function () { goBack('pkg-detail', selPkg); }} onDone={function () { goBack('activity'); }} /></ScreenWrap>}
          {scr === 'transactions' && <ScreenWrap screenKey="transactions" transition={tr}><TransactionsPage onBack={function () { goBack('account'); }} /></ScreenWrap>}
          {scr === 'terms' && <ScreenWrap screenKey="terms" transition={tr}><LegalPage type="terms" onBack={function () { goBack(prevScr || 'settings'); }} /></ScreenWrap>}
          {scr === 'privacy' && <ScreenWrap screenKey="privacy" transition={tr}><LegalPage type="privacy" onBack={function () { goBack(prevScr || 'settings'); }} /></ScreenWrap>}
          {scr === 'security' && <ScreenWrap screenKey="security" transition={tr}><SecurityPinPage onBack={function () { goBack('settings'); }} /></ScreenWrap>}
          {scr === 'delete-account' && <ScreenWrap screenKey="delete-account" transition={tr}><DeleteAccountPage onBack={function () { goBack('settings'); }} onLogout={function () { setNavDir('scr-fade'); sScr('auth'); }} /></ScreenWrap>}
          {scr === 'wallet' && <ScreenWrap screenKey="wallet" transition={tr}><WalletPage onBack={function () { goBack('home'); }} onNav={nav} /></ScreenWrap>}
          {scr === 'wallet-topup' && <ScreenWrap screenKey="wallet-topup" transition={tr}><WalletTopUpPage onBack={function () { goBack('wallet'); }} /></ScreenWrap>}
          {scr === 'qr-scan' && <ScreenWrap screenKey="qr-scan" transition={tr}><QRScannerPage onBack={function () { goBack('home'); }} /></ScreenWrap>}
          {showNav && <BNav active={scr} onNav={nav} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LocQarApp />);
  </script>
</body>

</html>
