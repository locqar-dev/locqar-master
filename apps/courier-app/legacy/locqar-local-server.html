  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #f8fafc;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3 {
      font-family: "Plus Jakarta Sans", "Inter", sans-serif;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes checkAnim {
      0% {
        stroke-dashoffset: 30
      }

      100% {
        stroke-dashoffset: 0
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(24px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(.94)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes pulse {

      75%,
      100% {
        transform: scale(2.5);
        opacity: 0
      }
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 12px rgba(225, 29, 72, .18)
      }

      50% {
        box-shadow: 0 0 24px rgba(225, 29, 72, .35)
      }
    }

    @keyframes avatarPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.45)
      }

      50% {
        box-shadow: 0 0 0 8px rgba(16, 185, 129, 0)
      }
    }

    @keyframes badgePulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.15)
      }
    }

    @keyframes otpGlow {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4)
      }

      50% {
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12)
      }
    }

    @keyframes surgeShimmer {
      0% {
        background-position: -200% center
      }

      100% {
        background-position: 200% center
      }
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }

      100% {
        background-position: 0% 50%
      }
    }

    @keyframes navPillSlide {
      from {
        opacity: 0;
        transform: scaleX(0.4)
      }

      to {
        opacity: 1;
        transform: scaleX(1)
      }
    }

    @keyframes trendBounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-3px)
      }
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(-12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(.85);
        opacity: 0
      }

      60% {
        transform: scale(1.03)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes countUp {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes dotPulse {

      0%,
      100% {
        opacity: .4
      }

      50% {
        opacity: 1
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0
      }

      100% {
        background-position: 200% 0
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-4px)
      }
    }

    .sp {
      animation: spin .8s linear infinite
    }

    .su {
      animation: slideUp .3s cubic-bezier(.2, .9, .3, 1) both
    }

    .fu {
      animation: fadeUp .4s cubic-bezier(.2, .9, .3, 1) both
    }

    .si {
      animation: scaleIn .4s cubic-bezier(.2, .9, .3, 1) both
    }

    .sd {
      animation: slideDown .3s cubic-bezier(.2, .9, .3, 1) both
    }

    .sr {
      animation: slideRight .3s ease both
    }

    .pop {
      animation: popIn .4s cubic-bezier(.2, .9, .3, 1)
    }

    .cup {
      animation: countUp .4s ease both
    }

    .float {
      animation: float 3s ease-in-out infinite
    }

    .stg1 {
      animation-delay: .05s
    }

    .stg2 {
      animation-delay: .1s
    }

    .stg3 {
      animation-delay: .15s
    }

    .stg4 {
      animation-delay: .2s
    }

    .stg5 {
      animation-delay: .25s
    }

    .glow {
      animation: glow 2s ease-in-out infinite
    }



    .tap {
      transition: all .2s cubic-bezier(.4, 0, .2, 1);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none
    }

    .tap:active {
      transform: scale(0.96);
      opacity: 0.8
    }

    .press {
      transition: all .15s cubic-bezier(.4, 0, .2, 1);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none
    }

    .press:active {
      transform: scale(0.94);
      filter: brightness(0.9)
    }

    .card-pr {
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: transform .3s ease, box-shadow .3s ease
    }

    .card-pr:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08)
    }

    .no-sb::-webkit-scrollbar {
      display: none
    }

    .no-sb {
      scrollbar-width: none
    }

    input:focus,
    button:focus {
      outline: none
    }

    input::placeholder {
      color: #94a3b8
    }
  </style>
</head>

            {[{ id: 'all', l: 'All Blocks' }, { id: 'surge', l: '⚡ Surge Pay' }].map(f =>
              <button key={f.id} onClick={() => setFilter(f.id)} className="tap" style={{ height: 32, padding: '0 14px', borderRadius: 16, border: 'none', fontSize: 14, fontWeight: 600, background: filter === f.id ? T.text : T.fill, color: filter === f.id ? '#fff' : T.text }}>{f.l}</button>
            )}
          </div>
          {/* Date picker */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12, background: T.fill, borderRadius: 12, padding: '8px 12px' }}>
            <button onClick={() => dayOffset > 0 && setDayOffset(dayOffset - 1)} className="tap" style={{ width: 32, height: 32, borderRadius: 8, border: 'none', background: dayOffset > 0 ? '#fff' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: dayOffset > 0 ? 1 : .3 }}><ArrowLeft size={16} /></button>
            <div style={{ textAlign: 'center' }}>
              <span style={{ fontSize: 14, fontWeight: 700 }}>{dayLabel}</span>
              <span style={{ fontSize: 13, color: T.sec, marginLeft: 6 }}>{selDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</span>
            </div>
            <button onClick={() => dayOffset < 6 && setDayOffset(dayOffset + 1)} className="tap" style={{ width: 32, height: 32, borderRadius: 8, border: 'none', background: dayOffset < 6 ? '#fff' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: dayOffset < 6 ? 1 : .3 }}><ArrowRight size={16} /></button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {filtered.map((b, i) => (
              <div key={b.id} className="fu" style={{
                borderRadius: 16, background: T.card, overflow: 'hidden',
                border: accepted === b.id ? `2px solid ${T.green}` : b.surge ? `1.5px solid #E8590C40` : `1.5px solid ${T.border}`,
                boxShadow: b.surge && accepted !== b.id ? '0 2px 16px rgba(232,89,12,0.12)' : T.shadow,
                animationDelay: `${i * 0.08}s`, display: 'flex',
              }}>
                {/* Left accent stripe */}
                <div style={{ width: 4, flexShrink: 0, background: accepted === b.id ? T.green : b.surge ? '#E8590C' : T.fill2 }} />
                <div style={{ flex: 1, padding: 16 }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span style={{ fontSize: 15, fontWeight: 700 }}>{b.time}</span>{b.surge && <Badge v="surge" sm>⚡ Surge</Badge>}</div>
                    <span style={{ fontSize: 17, fontWeight: 800, color: b.surge ? '#E8590C' : T.text }}>{b.pay}</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 12 }}><MapPin size={13} style={{ color: T.sec }} /><span style={{ fontSize: 13, color: T.sec }}>{b.area}</span></div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 12 }}>
                    {[{ l: 'Duration', v: b.type }, { l: 'Stops', v: b.stops }, { l: 'Distance', v: b.dist }].map((s, j) =>
                      <div key={j} style={{ borderRadius: 10, padding: '8px 6px', textAlign: 'center', background: T.bg }}><p style={{ fontSize: 11, color: T.muted, margin: 0 }}>{s.l}</p><p style={{ fontSize: 14, fontWeight: 700, margin: 0 }}>{s.v}</p></div>
                    )}
                  </div>
                  {accepted === b.id ? (
                    <div style={{ height: 48, borderRadius: 12, background: T.greenBg, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}><Check size={18} style={{ color: T.green }} /><span style={{ fontWeight: 700, fontSize: 14, color: T.green }}>Block Accepted!</span></div>
                  ) : swipeId === b.id ? (
                    <SwipeConfirm label="Swipe to accept" onConfirm={() => doAccept(b)} color={b.surge ? '#E8590C' : T.text} icon={<Check size={20} />} />
                  ) : (
                    <button onClick={() => setSwipeId(b.id)} className="press" style={{ width: '100%', height: 48, borderRadius: 14, border: 'none', fontWeight: 700, fontSize: 14, cursor: 'pointer', background: b.surge ? '#E8590C' : T.text, color: '#fff' }}>Accept Block</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>;
    };

    /* ---- SVG PIE CHART ---- */
    const PieChart = ({ slices, size = 120, hole = 0.55 }) => {
      const r = size / 2, ir = r * hole; let cum = 0;
      return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {slices.filter(s => s.value > 0).map((s, i) => {
          const total = slices.reduce((a, b) => a + b.value, 0);
          if (total === 0) return null;
          const pct = s.value / total; const startAngle = cum * 2 * Math.PI - Math.PI / 2; cum += pct; const endAngle = cum * 2 * Math.PI - Math.PI / 2;
          const largeArc = pct > 0.5 ? 1 : 0;
          const x1o = r + r * Math.cos(startAngle), y1o = r + r * Math.sin(startAngle);
          const x2o = r + r * Math.cos(endAngle), y2o = r + r * Math.sin(endAngle);
          const x1i = r + ir * Math.cos(endAngle), y1i = r + ir * Math.sin(endAngle);
          const x2i = r + ir * Math.cos(startAngle), y2i = r + ir * Math.sin(startAngle);
          if (pct >= 0.999) return <React.Fragment key={i}><circle cx={r} cy={r} r={r} fill={s.color} /><circle cx={r} cy={r} r={ir} fill={T.bg} /></React.Fragment>;
          return <path key={i} d={`M${x1o},${y1o} A${r},${r} 0 ${largeArc} 1 ${x2o},${y2o} L${x1i},${y1i} A${ir},${ir} 0 ${largeArc} 0 ${x2i},${y2i} Z`} fill={s.color} />;
        })}
        {slices.reduce((a, b) => a + b.value, 0) === 0 && <><circle cx={r} cy={r} r={r} fill={T.fill} /><circle cx={r} cy={r} r={ir} fill={T.bg} /></>}
      </svg>;
    };

    /* ---- HOME ---- */
    const HomeScreen = ({ dels, tasks, activeBlock, onNav, notifCount, onRefresh, shiftState, onClockIn, onClockOut, onBreak, onResume, vehicleConfig }) => {
      const [online, setOnline] = useState(!!activeBlock);
      const total = dels.length, done = dels.filter(d => d.status === 'delivered').length;
      const urg = dels.filter(d => d.pri === 'urgent' && d.status === 'pending').length;
      const pct = total > 0 ? (done / total) * 100 : 0;
      const curIdx = lockersData.findIndex(l => dels.some(d => d.locker === l.name && d.status === 'pending'));
      const curStop = curIdx >= 0 ? curIdx + 1 : lockersData.length;

      /* Task status counts from unified data */
      const assigned = tasks.filter(t => t.tab === 'assigned').length;
      const accepted = tasks.filter(t => t.tab === 'accepted').length;
      const inTransit = tasks.filter(t => t.tab === 'inTransit').length;
      const deposited = tasks.filter(t => t.tab === 'deposited').length;
      const recall = tasks.filter(t => t.tab === 'recall').length;
      const totalTasks = tasks.length;
      const dynamicEarn = deposited * RATE_PER_PKG;
      const pieSlices = [
        { label: 'Assigned', value: assigned, color: T.blue },
        { label: 'Accepted', value: accepted, color: T.amber },
        { label: 'In Transit', value: inTransit, color: T.purple },
        { label: 'Deposited', value: deposited, color: T.green },
        { label: 'Recalled', value: recall, color: T.red },
      ];
      const loaded = useScreenLoad(300);

      /* Pull-to-refresh */
      const [refreshing, setRefreshing] = useState(false);
      const [pullY, setPullY] = useState(0);
      const touchStartY = useRef(0); const scrollEl = useRef(null);
      const onTouchStart = e => { if (scrollEl.current && scrollEl.current.scrollTop === 0) touchStartY.current = e.touches[0].clientY };
      const onTouchMove = e => { if (!touchStartY.current) return; const dy = e.touches[0].clientY - touchStartY.current; if (dy > 0 && dy < 120) setPullY(dy) };
      const onTouchEnd = () => { if (pullY > 60) { setRefreshing(true); onRefresh && onRefresh(); setTimeout(() => { setRefreshing(false); setPullY(0) }, 1000) } else { setPullY(0) }; touchStartY.current = 0 };

      /* Active block timer */
      const [blockTime, setBlockTime] = useState('');
      useEffect(() => {
        if (!activeBlock) return;
        const parseTime = (s) => { const [t, p] = s.split(' '); const [h, m] = t.split(':').map(Number); return (p === 'PM' && h !== 12 ? h + 12 : p === 'AM' && h === 12 ? 0 : h) * 60 + m };
        const endStr = activeBlock.time.split('–')[1]?.trim() || activeBlock.time.split('-')[1]?.trim();
        if (!endStr) return;
        const tick = () => {
          const now = new Date(); const nowMin = now.getHours() * 60 + now.getMinutes();
          const endMin = parseTime(endStr); const diff = endMin - nowMin;
          if (diff <= 0) { setBlockTime('Ending soon'); return }
          setBlockTime(`${Math.floor(diff / 60)}h ${diff % 60}m left`);
        };
        tick(); const i = setInterval(tick, 30000); return () => clearInterval(i);
      }, [activeBlock]);

      return <div ref={scrollEl} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} style={{ minHeight: '100vh', background: T.bg, paddingBottom: 96 }}><StatusBar />
        {/* Pull-to-refresh indicator */}
        {pullY > 10 && <div style={{ display: 'flex', justifyContent: 'center', padding: `${Math.min(pullY / 2, 30)}px 0`, transition: pullY === 0 ? 'all .3s' : 'none' }}>
          <RefreshCw size={20} className={refreshing ? 'sp' : ''} style={{ color: T.sec, transform: `rotate(${pullY * 3}deg)`, transition: refreshing ? 'none' : 'transform .1s' }} />
        </div>}
        <div style={{ padding: '0 20px 12px' }}>
          {/* Premium Hero Card */}
          <div style={{
            borderRadius: 20, marginBottom: 16, overflow: 'hidden', position: 'relative',
            background: `linear-gradient(135deg, ${T.text} 0%, #1a2d4a 60%, #0f1928 100%)`,
            boxShadow: '0 8px 32px rgba(0,0,0,0.22)',
          }}>
            {/* Decorative circles */}
            <div style={{ position: 'absolute', top: -30, right: -20, width: 130, height: 130, borderRadius: '50%', background: 'rgba(225,29,72,0.12)', pointerEvents: 'none' }} />
            <div style={{ position: 'absolute', bottom: -20, left: -10, width: 90, height: 90, borderRadius: '50%', background: 'rgba(59,130,246,0.1)', pointerEvents: 'none' }} />

            {/* Top row: greeting + bell */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 16px 0' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                {/* Avatar with pulse ring */}
                <div style={{ position: 'relative', flexShrink: 0 }}>
                  <div style={{
                    width: 48, height: 48, borderRadius: 24, background: 'rgba(255,255,255,0.12)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22,
                    border: '2px solid rgba(255,255,255,0.25)',
                    animation: shiftState?.isActive ? 'avatarPulse 2s ease-in-out infinite' : 'none',
                  }}>{driver.avatar}</div>
                  {shiftState?.isActive && <div style={{ position: 'absolute', bottom: 0, right: 0, width: 14, height: 14, borderRadius: 7, background: T.green, border: '2px solid #0f1928' }} />}
                </div>
                <div>
                  <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.55)', margin: 0 }}>{getGreeting()}</p>
                  <h1 style={{ fontSize: 19, fontWeight: 800, margin: 0, color: '#fff', letterSpacing: '-0.01em' }}>{driver.name.split(' ')[0]} 👋</h1>
                </div>
              </div>
              <button onClick={() => onNav('notifs')} className="tap" style={{ width: 40, height: 40, borderRadius: 12, background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', color: '#fff' }}>
                <Bell size={18} />
                {notifCount > 0 && <div style={{ position: 'absolute', top: 3, right: 3, width: 16, height: 16, borderRadius: 8, background: T.red, border: '2px solid #0f1928', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><span style={{ fontSize: 9, fontWeight: 700, color: '#fff' }}>{notifCount > 9 ? '9+' : notifCount}</span></div>}
              </button>
            </div>

            {/* Earnings + Block info */}
            <div style={{ padding: '14px 16px 16px', display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
              <div>
                <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)', margin: '0 0 2px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Today's Earnings</p>
                <p style={{ fontSize: 30, fontWeight: 800, color: '#fff', margin: 0, lineHeight: 1, letterSpacing: '-0.02em' }}>GH₵ {driver.todayEarn.toFixed(2)}</p>
                <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)', margin: '4px 0 0' }}>{deposited} pkgs deposited today</p>
              </div>
              <div style={{ textAlign: 'right' }}>
                {activeBlock ? (
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 5, justifyContent: 'flex-end', marginBottom: 3 }}>
                      <div style={{ width: 7, height: 7, borderRadius: 4, background: T.green }} />
                      <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.6)', fontWeight: 600 }}>Live Block</span>
                    </div>
                    <p style={{ fontSize: 13, fontWeight: 700, color: '#fff', margin: 0 }}>{activeBlock.area}</p>
                    {blockTime && <span style={{ fontSize: 12, fontWeight: 700, color: T.green }}>{blockTime}</span>}
                  </div>
                ) : (
                  <button onClick={() => onNav('schedule')} className="tap" style={{ background: 'rgba(255,255,255,0.12)', border: '1px solid rgba(255,255,255,0.2)', borderRadius: 10, padding: '8px 14px', color: '#fff', fontWeight: 700, fontSize: 12, cursor: 'pointer' }}>
                    Find Block →
                  </button>
                )}
              </div>
            </div>

            {activeBlock && (
              <div style={{ borderTop: '1px solid rgba(255,255,255,0.08)', padding: '10px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)' }}>{activeBlock.time}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: T.green }}>{activeBlock.pay}</span>
              </div>
            )}
          </div>

          {/* Shift Timer + Vehicle Capacity */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 16 }}>
            <ShiftTimer shiftState={shiftState} onClockIn={onClockIn} onClockOut={onClockOut} onBreak={onBreak} onResume={onResume} />
            <VehicleCapacityCard tasks={tasks} vehicleConfig={vehicleConfig} />
          </div>
        </div>

        {/* ── Package Dashboard (with stats collapsed in) ── */}
        <div style={{ padding: '0 20px 16px' }}>
          {!loaded ? <div style={{ borderRadius: 16, padding: 20, background: T.card }}>
            <Skeleton w={140} h={14} r={6} /><div style={{ marginTop: 8 }}><Skeleton w={100} h={28} r={8} /></div>
            <div style={{ display: 'flex', gap: 20, marginTop: 16 }}><Skeleton w={110} h={110} r={55} /><div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 10 }}><Skeleton h={14} /><Skeleton h={14} /><Skeleton h={14} /><Skeleton h={14} /></div></div>
          </div>
            : <div style={{ borderRadius: 12, padding: 20, background: T.card, border: `1px solid ${T.border}` }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                <div><p style={{ fontSize: 12, fontWeight: 700, color: T.muted, margin: 0 }}>Package Overview</p><p style={{ fontSize: 24, fontWeight: 700, margin: '2px 0 0' }}>{totalTasks} <span style={{ fontSize: 14, fontWeight: 400, color: T.sec }}>pkgs</span></p></div>
                <button onClick={() => onNav('tasks')} className="tap" style={{ fontSize: 12, fontWeight: 600, color: T.blue, background: 'none', border: 'none' }}>View All</button>
              </div>
              <div style={{ display: 'flex', gap: 16 }}>
                <div style={{ position: 'relative' }}>
                  <PieChart slices={pieSlices} size={100} hole={0.6} />
                  <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, fontWeight: 700 }}>{assigned}</div>
                </div>
                <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {pieSlices.map(s => (
                    <div key={s.label} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2, background: s.color }} />
                      <span style={{ flex: 1, fontSize: 12, color: T.sec }}>{s.label}</span>
                      <span style={{ fontSize: 12, fontWeight: 600 }}>{s.value}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
                {assigned > 0 && <button onClick={() => onNav('tasks')} className="tap" style={{ flex: 1, height: 40, borderRadius: 8, border: 'none', fontWeight: 600, fontSize: 13, background: T.blue, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}><Camera size={14} />Scan ({assigned})</button>}
                <button onClick={() => onNav('lockers')} className="tap" style={{ flex: 1, height: 40, borderRadius: 8, border: `1px solid ${T.border}`, background: T.bg, fontWeight: 600, fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}><MapPin size={14} />Lockers</button>
              </div>
            </div>}
        </div>

        {urg > 0 && <div style={{ padding: '0 20px', marginBottom: 16 }}>
          <button onClick={() => onNav('itinerary')} className="tap" style={{ width: '100%', borderRadius: 12, padding: 14, background: T.amberBg, border: `1.5px solid ${T.amber}`, display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 16 }}>⚡</span><div style={{ flex: 1, textAlign: 'left' }}><p style={{ fontWeight: 700, fontSize: 14, color: T.amber, margin: 0 }}>{urg} Urgent Package{urg > 1 ? 's' : ''}</p></div><ChevronRight size={18} style={{ color: T.amber }} />
          </button>
        </div>}

        {activeBlock && <StopProgress current={curStop} total={lockersData.length} doneP={done} totalP={total} />}

        {activeBlock && <div style={{ padding: '16px 20px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <h2 style={{ fontWeight: 700, fontSize: 16, margin: 0 }}>Itinerary</h2>
              <Badge v="success" sm><Navigation size={10} />Optimized</Badge>
            </div>
            <button onClick={() => onNav('itinerary')} className="press" style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 600, color: T.red }}>All Stops</button>
          </div>
          {lockersData.map((l, i) => {
            const sd = dels.filter(d => d.locker === l.name); const dn = sd.filter(d => d.status === 'delivered').length; const allD = dn === sd.length; const isA = i === curIdx;
            return <button key={l.id} onClick={() => onNav(isA ? 'stop' : 'itinerary', isA ? { locker: l, stopNum: i + 1 } : null)} className="press" style={{ display: 'flex', alignItems: 'center', gap: 12, width: '100%', textAlign: 'left', background: isA ? T.blueBg : T.card, border: `1px solid ${isA ? T.blue : T.border}`, padding: 12, borderRadius: 12, marginBottom: 8 }}>
              <div style={{ width: 28, height: 28, borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: allD ? '#fff' : isA ? T.blue : T.sec, background: allD ? T.green : T.fill }}>{allD ? <Check size={14} /> : i + 1}</div>
              <div style={{ flex: 1 }}>
                <p style={{ fontWeight: 600, fontSize: 14, margin: 0, textDecoration: allD ? 'line-through' : 'none' }}>{l.name}</p>
                <p style={{ fontSize: 12, color: T.sec, margin: 0 }}>{l.dist} · {l.eta}</p>
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, color: allD ? T.green : T.sec }}>{dn}/{sd.length}</div>
            </button>;
          })}
        </div>}

        {!activeBlock && <div style={{ padding: '0 20px', textAlign: 'center', paddingTop: 16 }}>
          <div style={{ margin: '0 auto 12px', width: 48, height: 48, borderRadius: 16, background: T.fill, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><span style={{ fontSize: 24 }}>🗓️</span></div><p style={{ fontWeight: 700, margin: 0 }}>No active block</p><p style={{ fontSize: 14, color: T.sec, margin: 0 }}>Pick a delivery block to start</p>
        </div>}
      </div>;
    };

    /* ---- ITINERARY ---- */
    const ItineraryScreen = ({ dels, tasks, onBack, onNav }) => {
      const [routeMode, setRouteMode] = useState('distance');
      const sortedLockers = optimizeRoute(lockersData, tasks, routeMode);
      const curIdx = sortedLockers.findIndex(l => dels.some(d => d.locker === l.name && d.status === 'pending'));
      const done = dels.filter(d => d.status === 'delivered').length;
      const totalDist = sortedLockers.reduce((s, l) => s + l.distKm, 0);
      const totalEta = sortedLockers.reduce((s, l) => s + parseInt(l.eta), 0);
      return <div style={{ minHeight: '100vh', background: T.bg, paddingBottom: 80 }}><StatusBar />
        <TopBar title="Itinerary" onBack={onBack} />
        <StopProgress current={curIdx >= 0 ? curIdx + 1 : sortedLockers.length} total={sortedLockers.length} doneP={done} totalP={dels.length} />
        {/* Route summary + mode toggle */}
        <div style={{ padding: '12px 20px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 700 }}>📍 {totalDist.toFixed(1)} km</span>
              <span style={{ color: T.border }}>·</span>
              <span style={{ fontSize: 13, fontWeight: 700 }}>🕐 ~{totalEta} min</span>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[{ id: 'distance', l: 'Nearest' }, { id: 'priority', l: 'Priority' }, { id: 'balanced', l: 'Balanced' }].map(m => (
              <button key={m.id} onClick={() => setRouteMode(m.id)} className="tap" style={{ flex: 1, height: 32, borderRadius: 8, border: 'none', fontSize: 12, fontWeight: 600, background: routeMode === m.id ? T.text : T.fill, color: routeMode === m.id ? '#fff' : T.sec }}>{m.l}</button>
            ))}
          </div>
        </div>
        <div style={{ padding: '0 20px' }}>
          {sortedLockers.map((l, i) => {
            const sd = dels.filter(d => d.locker === l.name); const dn = sd.filter(d => d.status === 'delivered').length; const allD = dn === sd.length; const isA = i === curIdx;
            return <div key={l.id} className="fu" style={{ marginBottom: 16, animationDelay: `${i * 0.1}s` }}>
              <button onClick={() => onNav('stop', { locker: l, stopNum: i + 1 })} className="press" style={{ width: '100%', textAlign: 'left', border: 'none', background: 'none', display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginTop: 4 }}>
                  <div style={{ width: 40, height: 40, borderRadius: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700, color: '#fff', background: allD ? T.green : isA ? T.red : T.muted, boxShadow: isA ? '0 4px 12px ' + T.red + '30' : 'none' }}>{allD ? <Check size={18} /> : i + 1}</div>
                  {i < sortedLockers.length - 1 && <div style={{ width: 2, height: 24, marginTop: 4, background: allD ? T.green : T.border }} />}
                </div>
                <div style={{ flex: 1, borderRadius: 12, padding: 16, background: T.card, border: isA ? `1.5px solid ${T.red}` : '1.5px solid ' + T.border }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                    <div><p style={{ fontWeight: 700, margin: 0, opacity: allD ? .5 : 1 }}>{l.name}</p><p style={{ fontSize: 14, color: T.sec, margin: 0 }}>{l.addr}</p></div>
                    <div style={{ textAlign: 'right' }}><p style={{ fontSize: 20, fontWeight: 700, color: allD ? T.green : isA ? T.red : T.text, margin: 0 }}>{dn}/{sd.length}</p></div>
                  </div>
                  <div style={{ display: 'flex', gap: 12, marginTop: 8, alignItems: 'center' }}><span style={{ fontSize: 11 }}>📍</span><span style={{ fontSize: 12, color: T.sec }}>{l.dist}</span><span style={{ fontSize: 11 }}>🕐</span><span style={{ fontSize: 12, color: T.sec }}>{l.eta}</span></div>
                  <div style={{ marginTop: 10, height: 6, borderRadius: 3, background: T.fill, overflow: 'hidden' }}><div style={{ height: '100%', borderRadius: 3, width: `${sd.length > 0 ? (dn / sd.length) * 100 : 0}%`, background: allD ? T.green : T.red, transition: 'width .5s' }} /></div>
                </div>
              </button>
              {isA && <div style={{ marginLeft: 52, marginTop: 8, display: 'flex', flexDirection: 'column', gap: 6 }}>
                {sd.map(p => (
                  <div key={p.id} style={{ borderRadius: 10, padding: 10, display: 'flex', alignItems: 'center', gap: 10, background: p.status === 'delivered' ? T.greenBg : T.bg, border: `1px solid ${p.status === 'delivered' ? T.green : T.border}` }}>
                    <SizeIcon sz={p.sz} /><div style={{ flex: 1, minWidth: 0 }}><p style={{ fontSize: 14, fontFamily: '"Inter",sans-serif', fontWeight: 600, margin: 0 }}>{p.trk}</p><p style={{ fontSize: 12, color: T.sec, margin: 0 }}>{p.weight}</p></div>
                    {p.status === 'delivered' ? <Check size={16} style={{ color: T.green }} /> : <PriorityBadge pri={p.pri} sm /> || <Badge v="default" sm>Pending</Badge>}
                  </div>
                ))}
                <NavigationButton name={l.name} addr={l.addr} lat={l.lat} lng={l.lng} />
              </div>}
            </div>;
          })}
        </div>
      </div>;
    };

    /* ---- STOP ---- */
    const StopScreen = ({ locker, stopNum, dels, onBack, onNav, adjLockers }) => {
      const adjLocker = adjLockers?.find(l => l.name === locker.name) || locker;
      const pkgs = dels.filter(d => d.locker === locker.name);
      const pending = pkgs.filter(d => d.status === 'pending');
      const done = pkgs.filter(d => d.status === 'delivered');
      const allDone = pending.length === 0;

      return <div style={{ minHeight: '100vh', background: T.bg, paddingBottom: 120 }}><StatusBar />
        <TopBar title={`Stop ${stopNum} of ${lockersData.length}`} sub={locker.name} onBack={onBack}
          right={<button onClick={() => openNavigation(locker.name, locker.addr, locker.lat, locker.lng)} className="tap" style={{ width: 40, height: 40, borderRadius: 10, background: T.fill, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Navigation size={18} /></button>} />
        <div style={{ padding: '0 20px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16 }}>
            <div style={{ flex: 1, height: 8, borderRadius: 4, background: T.fill, overflow: 'hidden' }}>
              <div style={{ height: '100%', borderRadius: 4, width: `${pkgs.length > 0 ? (done.length / pkgs.length) * 100 : 0}%`, background: allDone ? T.green : T.red, transition: 'width .5s' }} />
            </div>
            <span style={{ fontSize: 14, fontWeight: 700, color: allDone ? T.green : T.text }}>{done.length}/{pkgs.length}</span>
          </div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
            <div style={{ flex: 1, borderRadius: 12, padding: 12, display: 'flex', alignItems: 'center', gap: 10, background: T.greenBg }}><Wifi size={16} style={{ color: T.green }} /><span style={{ fontSize: 14, fontWeight: 600, color: T.green }}>Online</span></div>
            <div style={{ borderRadius: 12, padding: 12, display: 'flex', alignItems: 'center', gap: 10, background: T.card }}><Battery size={16} style={{ color: T.sec }} /><span style={{ fontSize: 14, fontWeight: 600 }}>{locker.bat}%</span></div>
          </div>
          <div style={{ borderRadius: 12, padding: 16, background: T.card, marginBottom: 16 }}>
            <p style={{ fontSize: 12, fontWeight: 600, color: T.sec, margin: '0 0 12px', textTransform: 'uppercase' }}>Available Compartments</p>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 8 }}>
              {Object.entries(adjLocker.avail).map(([s, n]) => {
                const [bg, c] = sizeColor(s); return <div key={s} style={{ borderRadius: 12, padding: 10, textAlign: 'center', background: T.bg }}>
                  <div style={{ width: 36, height: 36, borderRadius: 8, margin: '0 auto 6px', background: bg, color: c, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700 }}>{s}</div>
                  <p style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>{n}</p><p style={{ fontSize: 11, color: T.muted, margin: 0 }}>free</p>
                </div>
              })}
            </div>
          </div>
          {pending.length > 0 && <><p style={{ fontSize: 12, fontWeight: 600, color: T.sec, margin: '0 0 10px', textTransform: 'uppercase' }}>To Deposit ({pending.length})</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
              {pending.map((p, i) => (
                <div key={p.id} style={{ borderRadius: 12, padding: 14, display: 'flex', alignItems: 'center', gap: 12, background: T.card }}>
                  <SizeIcon sz={p.sz} /><div style={{ flex: 1 }}><p style={{ fontWeight: 600, fontSize: 14, fontFamily: '"Inter",sans-serif', margin: 0 }}>{p.trk}</p><p style={{ fontSize: 12, color: T.sec, margin: 0 }}>{p.sz} · {p.weight}</p></div>
                  {p.pri === 'urgent' && <Badge v="danger" sm>⚡ Urgent</Badge>}
                </div>
              ))}
            </div></>}
          {done.length > 0 && <><p style={{ fontSize: 12, fontWeight: 600, color: T.sec, margin: '0 0 10px', textTransform: 'uppercase' }}>Completed ({done.length})</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {done.map(p => (<div key={p.id} style={{ borderRadius: 12, padding: 12, display: 'flex', alignItems: 'center', gap: 12, background: T.card, opacity: .6 }}>
                <SizeIcon sz={p.sz} /><div style={{ flex: 1 }}><p style={{ fontWeight: 600, fontSize: 14, fontFamily: '"Inter",sans-serif', margin: 0 }}>{p.trk}</p></div><Badge v="success" sm><Check size={10} />Done</Badge>
              </div>))}
            </div></>}
        </div>
        <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, padding: 20, background: T.bg, borderTop: `1px solid ${T.border}` }}>
          {allDone ? (
            <button onClick={onBack} className="press" style={{ width: '100%', height: 52, borderRadius: 16, border: 'none', fontWeight: 700, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: T.green, color: '#fff', boxShadow: '0 4px 12px ' + T.green + '30' }}><Check size={20} />Stop Complete</button>
          ) : (
            <SwipeConfirm label={`Swipe to start batch deposit (${pending.length})`} onConfirm={() => onNav('batch', { locker, stopNum })} icon={<Camera size={20} />} />
          )}
        </div>
      </div>;
    };

    /* ---- BATCH DEPOSIT ---- */
    const BatchDepositScreen = ({ locker, stopNum, dels, onBack, onDeposit }) => {
      const pkgs = dels.filter(d => d.locker === locker.name);
      const pending = pkgs.filter(d => d.status === 'pending');
      const done = pkgs.filter(d => d.status === 'delivered');
      const allDone = pending.length === 0;
      const currentPkg = pending[0] || null;
      const [phase, setPhase] = useState('idle');
      const [comp, setComp] = useState(null);
      const [justDeposited, setJustDeposited] = useState(null);
      const [batchCount, setBatchCount] = useState(0);

      useEffect(() => {
        if (phase === 'deposited') {
          const timer = setTimeout(() => { setJustDeposited(null); if (pending.length > 0) { setPhase('idle'); setComp(null) } else { setPhase('allDone') } }, 1200);
          return () => clearTimeout(timer);
        }
      }, [phase, pending.length]);

      const startScan = () => setPhase('scanning');
      const simulateScan = () => { setComp(Math.floor(Math.random() * 20) + 1); setPhase('assigning'); setTimeout(() => setPhase('opening'), 800); setTimeout(() => setPhase('place'), 2000) };
      const confirmDeposit = () => { if (!currentPkg) return; setJustDeposited(currentPkg); setBatchCount(p => p + 1); setPhase('deposited'); onDeposit(currentPkg.id) };
      const totalHere = pkgs.length;

      return (
        <div style={{ minHeight: '100vh', background: T.bg, display: 'flex', flexDirection: 'column' }}>
          <StatusBar />
          <div style={{ padding: '8px 20px 0' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <button onClick={onBack} className="tap" style={{ width: 40, height: 40, borderRadius: 10, background: T.fill, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><ArrowLeft size={20} /></button>
              <div style={{ flex: 1 }}><h1 style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>Batch Deposit</h1><p style={{ fontSize: 13, color: T.sec, margin: 0 }}>{locker.name} · Stop {stopNum}</p></div>
              <div style={{ background: T.text, borderRadius: 12, padding: '6px 14px', display: 'flex', alignItems: 'center', gap: 6 }}>
                <Package size={14} style={{ color: '#fff' }} />
                <span key={batchCount} style={{ color: '#fff', fontWeight: 700, fontSize: 16 }}>{done.length}</span>
                <span style={{ color: 'rgba(255,255,255,.4)', fontWeight: 600, fontSize: 14 }}>/{totalHere}</span>
              </div>
            </div>
          </div>
          <div style={{ padding: '0 20px 16px' }}><div style={{ height: 8, borderRadius: 4, background: T.fill, overflow: 'hidden' }}><div style={{ height: '100%', borderRadius: 4, background: allDone ? T.green : T.red, transition: 'width .5s ease', width: `${totalHere > 0 ? (done.length / totalHere) * 100 : 0}%` }} /></div></div>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 24px' }}>
            {(allDone || phase === 'allDone') && (
              <div style={{ textAlign: 'center', width: '100%' }}>
                <div style={{ width: 80, height: 80, borderRadius: 40, background: T.greenBg, margin: '0 auto 20px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width={40} height={40} viewBox="0 0 40 40"><circle cx={20} cy={20} r={18} fill="none" stroke={T.green} strokeWidth={3} /><path d="M12 20l6 6 10-12" fill="none" stroke={T.green} strokeWidth={3} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={30} style={{ animation: 'checkAnim .5s ease forwards' }} /></svg>
                </div>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: '0 0 4px' }}>🎉 All Deposited!</h2>
                <p style={{ fontSize: 14, color: T.sec, margin: '0 0 8px' }}>{totalHere} package{totalHere > 1 ? 's' : ''} deposited at {locker.name}</p>
                <p style={{ fontSize: 13, color: T.muted }}>Customers have been notified via SMS</p>
                <button onClick={onBack} className="tap" style={{ marginTop: 24, width: '100%', height: 52, borderRadius: 10, border: 'none', fontWeight: 700, fontSize: 16, background: T.green, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}><Check size={20} />Continue Route</button>
              </div>
            )}
            {phase === 'idle' && currentPkg && (
              <div style={{ textAlign: 'center', width: '100%' }}>
                <div style={{ borderRadius: 12, padding: 16, background: T.card, marginBottom: 20, display: 'flex', alignItems: 'center', gap: 12, textAlign: 'left' }}>
                  <SizeIcon sz={currentPkg.sz} big />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }}><p style={{ fontWeight: 700, fontFamily: '"Inter",sans-serif', fontSize: 16, margin: 0 }}>{currentPkg.trk}</p>{currentPkg.pri === 'urgent' && <Badge v="danger" sm>⚡ Urgent</Badge>}</div>
                    <p style={{ fontSize: 13, color: T.sec, margin: 0 }}>{currentPkg.sz} compartment · {currentPkg.weight}</p>
                  </div>
                  <div style={{ textAlign: 'center' }}><p style={{ fontSize: 11, color: T.muted, margin: 0 }}>NEXT</p><p style={{ fontSize: 20, fontWeight: 700, color: T.red, margin: 0 }}>#{pending.indexOf(currentPkg) + 1}</p></div>
                </div>
                {pending.length > 1 && (
                  <div style={{ marginBottom: 20 }}>
                    <p style={{ fontSize: 12, fontWeight: 600, color: T.muted, margin: '0 0 8px' }}>UP NEXT ({pending.length - 1} more)</p>
                    <div style={{ display: 'flex', gap: 6, justifyContent: 'center', flexWrap: 'wrap' }}>
                      {pending.slice(1, 6).map((p, i) => {
                        const [bg, c] = sizeColor(p.sz); return (
                          <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 4, background: T.fill, borderRadius: 8, padding: '4px 10px' }}>
                            <div style={{ width: 20, height: 20, borderRadius: 4, background: bg, color: c, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700 }}>{p.sz}</div>
                            <span style={{ fontSize: 11, fontFamily: '"Inter",sans-serif', color: T.sec }}>{p.trk.slice(-4)}</span>
                          </div>
                        )
                      })}
                    </div>
                  </div>
                )}
                <button onClick={startScan} className="press" style={{ width: '100%', height: 52, borderRadius: 14, border: 'none', fontWeight: 700, fontSize: 16, background: T.red, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, boxShadow: '0 4px 12px ' + T.red + '30' }}>📷 Scan Package</button>
              </div>
            )}
            {phase === 'scanning' && (
              <div style={{ textAlign: 'center', width: '100%' }}>
                <div style={{ width: 200, height: 200, borderRadius: 12, background: T.fill, margin: '0 auto 20px', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
                  <div style={{ position: 'absolute', inset: 12, border: `2px dashed ${T.red}`, borderRadius: 10 }} />
                  <Camera size={40} style={{ color: T.muted }} />
                </div>
                <p style={{ fontWeight: 700, margin: '0 0 4px' }}>Scan {currentPkg?.trk}</p>
                <p style={{ fontSize: 14, color: T.sec, margin: '0 0 20px' }}>Align QR code within the frame</p>
                <button onClick={simulateScan} className="tap" style={{ height: 48, padding: '0 32px', borderRadius: 10, border: 'none', fontWeight: 600, background: T.fill }}>Simulate Scan</button>
              </div>
            )}
            {phase === 'assigning' && (
              <div style={{ textAlign: 'center' }}>
                <div className="sp" style={{ width: 48, height: 48, borderRadius: 24, border: `3px solid ${T.fill}`, borderTopColor: T.red, margin: '0 auto 16px' }} />
                <p style={{ fontWeight: 700, margin: '0 0 4px' }}>Assigning Compartment...</p>
                <p style={{ fontSize: 14, color: T.sec }}>Finding best fit for {currentPkg?.sz}</p>
              </div>
            )}
            {phase === 'opening' && (
              <div style={{ textAlign: 'center' }}>
                <div style={{ width: 64, height: 64, borderRadius: 16, background: T.fill, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}><span style={{ fontSize: 28 }}>🔐</span></div>
                <p style={{ fontWeight: 700, fontSize: 18, margin: '0 0 4px' }}>Opening #{comp}</p>
                <p style={{ fontSize: 14, color: T.sec }}>Unlocking compartment...</p>
              </div>
            )}
            {phase === 'place' && (
              <div style={{ textAlign: 'center', width: '100%' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 16, marginBottom: 16 }}>
                  <CheckCircle size={36} style={{ color: T.green }} />
                  <div style={{ background: T.card, borderRadius: 12, padding: '8px 16px', textAlign: 'center' }}>
                    <p style={{ fontSize: 11, color: T.muted, margin: 0 }}>COMPARTMENT</p>
                    <p style={{ fontSize: 28, fontWeight: 700, margin: 0 }}>#{comp}</p>
                  </div>
                </div>
                <p style={{ fontWeight: 700, fontSize: 18, color: T.green, margin: '0 0 4px' }}>Locker Open!</p>
                <p style={{ fontSize: 14, color: T.sec, margin: '0 0 4px' }}>Place <b>{currentPkg?.trk}</b> inside</p>
                <p style={{ fontSize: 13, color: T.muted, margin: '0 0 24px' }}>Close the door when done</p>
                <SwipeConfirm label="Swipe to confirm deposit" onConfirm={confirmDeposit} color={T.green} icon={<CheckCircle size={20} />} />
              </div>
            )}
            {phase === 'deposited' && justDeposited && (
              <div style={{ textAlign: 'center' }}>
                <div style={{ width: 64, height: 64, borderRadius: 32, background: T.greenBg, margin: '0 auto 12px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Check size={28} style={{ color: T.green }} /></div>
                <p style={{ fontWeight: 700, fontSize: 16, margin: '0 0 4px' }}>{justDeposited.trk} deposited</p>
                <p style={{ fontSize: 13, color: T.sec, margin: 0 }}>{pending.length > 0 ? 'Loading next package...' : 'All done at this stop!'}</p>
              </div>
            )}
          </div>
          {done.length > 0 && phase !== 'allDone' && !allDone && (
            <div style={{ padding: '12px 20px 20px', borderTop: `1px solid ${T.border}` }}>
              <p style={{ fontSize: 12, fontWeight: 600, color: T.sec, margin: '0 0 8px', textTransform: 'uppercase' }}>Deposited this session</p>
              <div style={{ display: 'flex', gap: 6, overflowX: 'auto' }} className="no-sb">
                {done.map((p, i) => (
                  <div key={p.id} style={{ flexShrink: 0, display: 'flex', alignItems: 'center', gap: 6, background: T.greenBg, borderRadius: 10, padding: '6px 10px', border: `1px solid ${T.green}` }}>
                    <Check size={12} style={{ color: T.green }} /><span style={{ fontSize: 12, fontFamily: '"Inter",sans-serif', fontWeight: 600, color: T.green }}>{p.trk.slice(-4)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ---- NOTIFICATIONS ---- */
    const NotifsScreen = ({ onBack, notifItems, setNotifItems }) => {
      const items = notifItems; const setItems = setNotifItems;
      const unread = items.filter(n => !n.read).length;
      const iconMap = {
        urgent: { icon: <AlertTriangle size={18} />, bg: T.amberBg, color: T.amber },
        info: { icon: <Bell size={18} />, bg: T.blueBg, color: T.blue },
        success: { icon: <CheckCircle size={18} />, bg: T.greenBg, color: T.green },
      };
      return <div style={{ minHeight: '100vh', background: T.bg, paddingBottom: 32 }}><StatusBar />
        <TopBar title="Notifications" onBack={onBack} right={unread > 0 && <button onClick={() => setItems(items.map(n => ({ ...n, read: true })))} className="press" style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 700, color: T.red }}>Mark all read</button>} />
        <div style={{ padding: '0 20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          {items.map((n, i) => {
            const ic = iconMap[n.type] || iconMap.info;
            return <div key={n.id} className="fu" style={{
              borderRadius: 16, padding: 16, background: T.card, boxShadow: T.shadow,
              opacity: n.read ? .55 : 1, animationDelay: `${i * 0.06}s`,
              borderLeft: !n.read ? `3px solid ${ic.color}` : '3px solid transparent',
              transition: 'opacity .3s, border .3s',
            }}>
              <div style={{ display: 'flex', gap: 12 }}>
                <div style={{ width: 42, height: 42, borderRadius: 12, background: ic.bg, color: ic.color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{ic.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3 }}>
                    <p style={{ fontWeight: 700, fontSize: 14, margin: 0 }}>{n.title}</p>
                    {!n.read && <div style={{ width: 8, height: 8, borderRadius: 4, background: T.red, animation: 'badgePulse 2s ease-in-out infinite' }} />}
                  </div>
                  <p style={{ fontSize: 13, color: T.sec, margin: '0 0 4px', lineHeight: 1.4 }}>{n.body}</p>
                  <p style={{ fontSize: 11, color: T.muted, margin: 0 }}>{n.time}</p>
                </div>
              </div>
            </div>;
          })}
        </div>
      </div>;
    };

    /* ---- EARNINGS ---- */
    const EarningsScreen = ({ onBack }) => {
      const [period, setPeriod] = useState('week');
      const weekDays = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], weekVals = [45, 62, 38, 71, 55, 89, 67];
      const monthDays = ['W1', 'W2', 'W3', 'W4'], monthVals = [320, 410, 380, driver.monthEarn - 1110];
      const dayHours = ['6a', '8a', '10a', '12p', '2p', '4p', '6p', '8p'], dayVals = [0, 18, 22, 35, 12, 28, 8, 5];
      const labels = period === 'day' ? dayHours : period === 'month' ? monthDays : weekDays;
      const vals = period === 'day' ? dayVals : period === 'month' ? monthVals : weekVals;
      const mx = Math.max(...vals);
      const activeIdx = period === 'week' ? Math.max(0, new Date().getDay() - 1) : period === 'day' ? Math.min(Math.floor(new Date().getHours() / 2.5), 7) : new Date().getDate() <= 7 ? 0 : new Date().getDate() <= 14 ? 1 : new Date().getDate() <= 21 ? 2 : 3;
      const totalLabel = period === 'day' ? 'Today' : period === 'month' ? 'This Month' : 'This Week';
      const totalVal = period === 'day' ? driver.todayEarn : period === 'month' ? driver.monthEarn : driver.weekEarn;
      return <div style={{ minHeight: '100vh', background: T.bg, paddingBottom: 80 }}><StatusBar />
        <TopBar title="Earnings" onBack={onBack} />
        <div style={{ padding: '0 20px' }}>
          {/* Period toggle */}
          <div style={{ display: 'flex', borderRadius: 14, background: T.fill, padding: 4, marginBottom: 16 }}>
            {[{ id: 'day', l: 'Daily' }, { id: 'week', l: 'Weekly' }, { id: 'month', l: 'Monthly' }].map(p => (
              <button key={p.id} onClick={() => setPeriod(p.id)} className="tap" style={{ flex: 1, height: 38, borderRadius: 11, border: 'none', fontWeight: 700, fontSize: 13, background: period === p.id ? T.card : 'transparent', color: period === p.id ? T.text : T.sec, boxShadow: period === p.id ? T.shadowMd : 'none', transition: 'all .2s' }}>{p.l}</button>
            ))}

          {/* Hero gradient card */}

    /* ---- SHIFT TIMER ---- */
    const ShiftTimer = ({ shiftState, onClockIn, onClockOut, onBreak, onResume }) => {
      const [elapsed, setElapsed] = useState('0:00');
      useEffect(() => {
        if (!shiftState?.isActive) return;
        const tick = () => {
          const start = new Date(shiftState.clockInTime);
          const breakMs = (shiftState.breaks || []).reduce((s, b) => s + (b.end ? new Date(b.end) - new Date(b.start) : 0), 0);
          const curBreak = shiftState.currentBreakStart ? Date.now() - new Date(shiftState.currentBreakStart).getTime() : 0;
          const ms = Date.now() - start.getTime() - breakMs - curBreak;
          const h = Math.floor(ms / 3600000); const m = Math.floor((ms % 3600000) / 60000);
          setElapsed(`${h}:${String(m).padStart(2, '0')}`);
        };
        tick(); const i = setInterval(tick, 30000); return () => clearInterval(i);
      }, [shiftState]);
      if (!shiftState?.isActive) return <button onClick={onClockIn} className="press" style={{ width: '100%', borderRadius: 16, height: 52, background: T.green, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, color: '#fff', fontWeight: 800, fontSize: 15, boxShadow: `0 8px 16px ${T.green}30`, letterSpacing: '-0.01em' }}>
        <Clock size={18} />Clock In

      return <div style={{ borderRadius: 12, padding: 16, background: T.card, border: `1px solid ${T.border}`, marginBottom: 12 }}>

          </div>

        </div>
        <div style={{ display: 'flex', gap: 8 }}>

          <button onClick={onClockOut} className="tap" style={{ flex: 1, height: 36, borderRadius: 8, border: 'none', background: T.redBg, color: T.red, fontWeight: 600, fontSize: 13 }}>Clock Out</button>

        { id: 'recall', label: 'Recall', icon: '↩️', color: T.red, bg: T.redBg },
      ];

      const counts = tabs.reduce((a, t) => ({ ...a, [t.id]: tasks.filter(tk => tk.tab === t.id).length }), {});
      const totalActive = counts.assigned + counts.accepted + counts.inTransit;

      const filtered = tasks.filter(t => {
        if (t.tab !== activeTab) return false;
        if (search) { const q = search.toLowerCase(); if (!(t.trk.toLowerCase().includes(q) || t.locker.toLowerCase().includes(q) || t.receiver.toLowerCase().includes(q) || t.sender.toLowerCase().includes(q))) return false }
        if (filters.priority !== 'all' && t.pri !== filters.priority) return false;
        if (filters.locker !== 'all' && t.locker !== filters.locker) return false;
        if (filters.size !== 'all' && t.sz !== filters.size) return false;
        return true;
      }).sort((a, b) => {
        if (sortBy === 'priority') return (priOrder[a.pri] ?? 3) - (priOrder[b.pri] ?? 3);
        if (sortBy === 'size') { const o = { S: 0, M: 1, L: 2, XL: 3 }; return o[a.sz] - o[b.sz] }
        if (sortBy === 'locker') return a.locker.localeCompare(b.locker);
        return 0;
      });

      const showToast = (msg, color) => { setToast({ msg, color }); setTimeout(() => setToast(null), 2200) };

      const moveTask = (id, to, label) => {
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const extra = to === 'accepted' ? { acceptedAt: now } : to === 'inTransit' ? { inTransitAt: now } : to === 'deposited' ? { depositedAt: now } : {};

            {search && <button onClick={() => setSearch('')} style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', border: 'none', background: 'none', cursor: 'pointer', color: T.muted, padding: 4 }}><X size={14} /></button>}

        {/* Toast notification */}
        {

              {toast.msg}

          )
        }
      </div >;
    };

    /* ---- NAV ---- */
    const NavIcons = {
      home: (active) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active ? 2.2 : 1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
      tasks: (active) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active ? 2.2 : 1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="9" y1="13" x2="15" y2="13" /><line x1="9" y1="17" x2="13" y2="17" /></svg>,
      schedule: (active) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active ? 2.2 : 1.8} strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>,
      earnings: (active) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active ? 2.2 : 1.8} strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" /></svg>,
      profile: (active) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active ? 2.2 : 1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>,
    };

    const Nav = ({ active, onNav }) => (
      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: T.card, borderTop: `1px solid ${T.border}`, paddingBottom: 'env(safe-area-inset-bottom, 0px)', boxShadow: '0 -4px 20px rgba(0,0,0,.07)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-around', maxWidth: 448, margin: '0 auto', padding: '4px 0 6px' }}>
          {[
            { id: 'home', l: 'Home' },
            { id: 'tasks', l: 'Tasks' },
            { id: 'schedule', l: 'Blocks' },
            { id: 'earnings', l: 'Earn' },
            { id: 'profile', l: 'Profile' }
          ].map(t => {
            const isActive = active === t.id;
            return (
              <button key={t.id} onClick={() => onNav(t.id)} className="tap"
                style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '6px 14px', border: 'none', background: 'none', position: 'relative', color: isActive ? T.red : T.muted, transition: 'color .2s ease' }}>
                {isActive && <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', width: 28, height: 3, borderRadius: '0 0 3px 3px', background: T.red, animation: 'navPillSlide .25s ease both' }} />}
                <span style={{ transition: 'transform .2s', transform: isActive ? 'translateY(1px)' : 'none' }}>
                  {NavIcons[t.id]?.(isActive)}
                </span>
                <span style={{ fontSize: 10, fontWeight: isActive ? 700 : 500, letterSpacing: isActive ? '0.02em' : '0', transition: 'all .2s' }}>{t.l}</span>
              </button>
            );
          })}
        </div>
      </div>
    );

    /* ---- APP ---- */
    function LocQarDriverApp() {
      /* localStorage helpers */
      const loadState = (key, def) => { try { const v = localStorage.getItem('locqar_' + key); return v ? JSON.parse(v) : def } catch (e) { return def } };
      const saveState = (key, val) => { try { localStorage.setItem('locqar_' + key, JSON.stringify(val)) } catch (e) { } };

      /* Migrate old tab names for existing users */
      const migrateTasks = (ts) => ts.map(t => {
        if (t.tab === 'pending') return { ...t, tab: 'accepted', acceptedAt: t.acceptedAt || 'Migrated' };
        if (t.tab === 'completed') return { ...t, tab: 'deposited', depositedAt: t.completedAt || t.depositedAt || 'Migrated' };
        return t;
      });

      const [scr, setScr] = useState('splash');
      const [prevScr, setPrevScr] = useState(null);
      const [tasks, setTasks] = useState(() => migrateTasks(loadState('tasks', tasksData)));
      const [curLock, setCurLock] = useState(null);
      const [curStop, setCurStop] = useState(null);
      const [activeBlock, setActiveBlock] = useState(() => loadState('activeBlock', null));
      const [darkMode, setDarkMode] = useState(() => loadState('darkMode', false));
      T = darkMode ? darkTheme : lightTheme;
      const [loginPhone, setLoginPhone] = useState('');
      const [notifs, setNotifs] = useState(notifsData);
      const [undoToast, setUndoToast] = useState(null);
      const [shiftState, setShiftState] = useState(() => loadState('shift', null));
      const [vehicleConfig, setVehicleConfig] = useState(() => loadState('vehicle', { type: 'Van', maxCapacity: 30, maxWeight: 150 }));
      const [exceptionTask, setExceptionTask] = useState(null);
      const [verifyTask, setVerifyTask] = useState(null);
      const undoTimer = useRef(null);
      const hist = useRef([]);

      /* Derive deliveries from unified tasks — deposited = 'delivered', others = 'pending' */
      const dels = tasks.filter(t => t.tab !== 'recall').map(t => ({ ...t, status: t.tab === 'deposited' ? 'delivered' : 'pending' }));
      const notifCount = notifs.filter(n => !n.read).length;

      /* Adjust locker compartment availability based on deposited packages */
      const adjLockers = lockersData.map(l => {
        const deposited = tasks.filter(t => t.locker === l.name && t.tab === 'deposited');
        const used = {}; deposited.forEach(t => { used[t.sz] = (used[t.sz] || 0) + 1 });
        return { ...l, avail: { ...l.avail, ...Object.fromEntries(Object.entries(l.avail).map(([k, v]) => [k, Math.max(0, v - (used[k] || 0))])) } };
      });

      /* Persist state changes */
      useEffect(() => saveState('tasks', tasks), [tasks]);
      useEffect(() => saveState('activeBlock', activeBlock), [activeBlock]);
      useEffect(() => saveState('darkMode', darkMode), [darkMode]);
      useEffect(() => { document.body.style.background = T.bg }, [darkMode]);
      useEffect(() => saveState('shift', shiftState), [shiftState]);
      useEffect(() => saveState('vehicle', vehicleConfig), [vehicleConfig]);

      /* Push dynamic notification helper */
      const pushNotif = (type, title, body) => {
        setNotifs(prev => [{ id: Date.now(), type, title, body, time: 'Just now', read: false }, ...prev]);
      };

      /* Screen transition */
      const [transClass, setTransClass] = useState('');
      const animateScreen = (next) => { setTransClass('si'); setTimeout(() => setTransClass(''), 300) };

      const nav = useCallback((s, data) => {
        hist.current.push(scr);
        if (s === 'stop' && data) { setCurLock(data.locker); setCurStop(data.stopNum) }
        if (s === 'batch' && data) { setCurLock(data.locker); setCurStop(data.stopNum) }
        setPrevScr(scr); animateScreen(s); setScr(s);
      }, [scr]);

      const back = useCallback(() => { const prev = hist.current.pop() || 'home'; setPrevScr(scr); animateScreen(prev); setScr(prev) }, [scr]);
      const depositOne = useCallback((id) => {
        const pkg = tasks.find(t => t.id === id);
        setTasks(p => p.map(t => t.id === id ? { ...t, tab: 'deposited', depositedAt: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) } : t));
        if (pkg) pushNotif('success', 'Deposited', `${pkg.trk} deposited at ${pkg.locker}`);
        /* Undo toast */
        if (undoTimer.current) clearTimeout(undoTimer.current);
        setUndoToast(id);
        undoTimer.current = setTimeout(() => setUndoToast(null), 4000);
      }, [tasks]);
      const undoDeposit = useCallback((id) => {
        setTasks(p => p.map(t => t.id === id ? { ...t, tab: 'inTransit', depositedAt: undefined } : t));
        setUndoToast(null);
      }, []);
      const acceptBlock = useCallback((block) => { setActiveBlock(block); pushNotif('info', 'Block Started', `${block.area} block accepted`); hist.current = []; setPrevScr(scr); setScr('home') }, [scr]);
      /* Shift handlers */
      const clockIn = () => setShiftState({ isActive: true, clockInTime: new Date().toISOString(), breaks: [], currentBreakStart: null });
      const clockOut = () => { pushNotif('info', 'Shift Ended', 'Clock-out recorded'); setShiftState(null) };
      const startBreak = () => setShiftState(s => ({ ...s, currentBreakStart: new Date().toISOString() }));
      const endBreak = () => setShiftState(s => ({ ...s, breaks: [...(s.breaks || []), { start: s.currentBreakStart, end: new Date().toISOString() }], currentBreakStart: null }));
      /* Exception handler */
      const submitException = (exc) => {
        if (exceptionTask) {
          setTasks(p => p.map(t => t.id === exceptionTask.id ? { ...t, exception: exc } : t));
          pushNotif('urgent', 'Issue Reported', `${exceptionTask.trk}: ${exc.type}`);
          setExceptionTask(null); back();
        }
      };
      const showNav = ['home', 'tasks', 'itinerary', 'schedule', 'earnings', 'profile', 'lockers'].includes(scr);

      return <div style={{ maxWidth: 448, margin: '0 auto', minHeight: '100vh', background: T.bg, position: 'relative', fontFamily: '"Inter",sans-serif' }}>
        <div className={transClass} key={scr}>
          {scr === 'splash' && <SplashScreen onDone={() => setScr('login')} />}
          {scr === 'login' && <LoginScreen onLogin={(ph) => { setLoginPhone(ph); hist.current.push('login'); setScr('otp') }} />}
          {scr === 'otp' && <OtpScreen phone={loginPhone} onVerify={() => { hist.current = []; setScr('home') }} onBack={back} />}
          {scr === 'home' && <HomeScreen dels={dels} tasks={tasks} activeBlock={activeBlock} onNav={nav} notifCount={notifCount} onRefresh={() => { }} shiftState={shiftState} onClockIn={clockIn} onClockOut={clockOut} onBreak={startBreak} onResume={endBreak} vehicleConfig={vehicleConfig} />}
          {scr === 'schedule' && <ScheduleScreen onBack={back} onAccept={acceptBlock} />}
          {scr === 'itinerary' && <ItineraryScreen dels={dels} tasks={tasks} onBack={back} onNav={nav} />}
          {scr === 'stop' && curLock && <StopScreen locker={curLock} stopNum={curStop} dels={dels} onBack={back} onNav={nav} adjLockers={adjLockers} />}
          {scr === 'batch' && curLock && <BatchDepositScreen locker={curLock} stopNum={curStop} dels={dels} onBack={back} onDeposit={depositOne} />}
          {scr === 'tasks' && <TasksScreen tasks={tasks} setTasks={setTasks} onBack={back} />}
          {scr === 'earnings' && <EarningsScreen onBack={back} />}
          {scr === 'notifs' && <NotifsScreen onBack={back} notifItems={notifs} setNotifItems={setNotifs} />}
          {scr === 'profile' && <ProfileScreen onBack={back} onNav={nav} onLogout={() => { setScr('login'); setActiveBlock(null); hist.current = []; localStorage.removeItem('locqar_tasks'); localStorage.removeItem('locqar_activeBlock') }} />}
          {scr === 'profileInfo' && <ProfileInfoScreen onBack={back} />}
          {scr === 'profileSafety' && <ProfileSafetyScreen onBack={back} />}
          {scr === 'profileSettings' && <ProfileSettingsScreen onBack={back} darkMode={darkMode} onToggleDark={() => setDarkMode(d => !d)} />}
          {scr === 'profileHelp' && <ProfileHelpScreen onBack={back} />}
          {scr === 'lockers' && <LockerDirectoryScreen tasks={tasks} adjLockers={adjLockers} onBack={back} />}
          {scr === 'history' && <DeliveryHistoryScreen tasks={tasks} onBack={back} />}
          {scr === 'exception' && exceptionTask && <ExceptionReportScreen task={exceptionTask} onSubmit={submitException} onBack={() => { setExceptionTask(null); back() }} />}
          {scr === 'vehicleSettings' && <VehicleSettingsScreen vehicleConfig={vehicleConfig} setVehicleConfig={setVehicleConfig} onBack={back} />}
        </div>
        <OfflineBanner />
        {verifyTask && <VerificationModal task={verifyTask} onVerified={() => { setVerifyTask(null) }} onClose={() => setVerifyTask(null)} />}
        {/* Undo toast for batch deposit */}
        {undoToast && <div style={{ position: 'fixed', bottom: showNav ? 72 : 16, left: 16, right: 16, maxWidth: 416, margin: '0 auto', zIndex: 150, padding: '12px 16px', borderRadius: 12, background: T.text, display: 'flex', alignItems: 'center', gap: 10, boxShadow: T.shadowLg, animation: 'slideUp .2s ease' }}>
          <CheckCircle size={18} style={{ color: T.green, flexShrink: 0 }} />
          <span style={{ flex: 1, color: '#fff', fontSize: 13, fontWeight: 600 }}>Package deposited</span>
          <button onClick={() => undoDeposit(undoToast)} style={{ border: 'none', background: 'none', color: T.amber, fontWeight: 700, fontSize: 13, padding: '4px 8px' }}>Undo</button>
        </div>}
        {showNav && <Nav active={scr} onNav={nav} />}
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LocQarDriverApp />);
  </script>
</body>

</html>
